<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kode Rahasia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fdf2f8; 
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .card {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
            transition: transform 0.3s;
        }

        /* Animasi getar saat password salah */
        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        h1 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #d81b60;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px 15px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #d81b60;
        }

        .clue {
            font-size: 13px;
            font-style: italic;
            color: #777;
            margin-bottom: 25px;
            display: block;
        }

        .btn {
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        /* Styling pesan error */
        #error-msg {
            color: #f44336;
            font-weight: 600;
            margin-top: 15px;
            font-size: 15px;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div class="card" id="password-card">
        <h1>Kalau sudah, masukan Passwordnya</h1>
        
        <input type="text" id="password-input" placeholder="Ketik di sini..." autocomplete="off">
        <span class="clue">Clue: yang biasa dibilang Shauna kalau udah acc</span>
        
        <br>
        <button class="btn" onclick="checkPassword()">Masuk</button>

        <div id="error-msg">Bleee salahhh :P</div>
    </div>

    <script>
        function checkPassword() {
            // Ambil nilai dari input, hapus spasi berlebih, dan ubah ke huruf kecil
            const userInput = document.getElementById("password-input").value.trim().toLowerCase();
            const errorMsg = document.getElementById("error-msg");
            const card = document.getElementById("password-card");

            // LOGIKA BARU: Mengecek apakah di dalam ketikan pengguna terdapat kata "good"
            if (userInput.includes("good")) {
                // Jika mengandung kata "good", lanjut ke halaman berikutnya
                window.location.href = "final.html";
            } else {
                // Jika Salah (tidak ada kata "good")
                
                // 1. Tampilkan pesan error
                errorMsg.style.display = "block";
                setTimeout(() => { errorMsg.style.opacity = "1"; }, 10);
                
                // 2. Tambahkan animasi getar
                card.classList.add("shake");
                
                // Hapus kelas shake setelah animasi selesai agar bisa digunakan lagi
                setTimeout(() => { 
                    card.classList.remove("shake"); 
                }, 500);

                // 3. Kembalikan ke halaman utama setelah 2 detik
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2000);
            }
        }

        // Fitur: Tekan 'Enter' di keyboard akan memicu tombol masuk
        document.getElementById("password-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkPassword();
            }
        });
    </script>

</body>
</html>
