<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat Penghargaan</title>
    <style>
        /* Mengambil font Poppins dan Great Vibes untuk sertifikat */
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fdf2f8; 
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .card {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 550px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            position: relative;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #d81b60;
        }

        .btn {
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .btn-claim { background-color: #ff9800; color: white; font-size: 18px; padding: 15px 40px; }
        .btn-ulang { background-color: #607d8b; color: white; }
        .btn-tambahan { background-color: #4CAF50; color: white; }
        .btn-submit { background-color: #d81b60; color: white; margin-top: 15px; }

        .hidden { display: none !important; }

        /* Area boneka kertas */
        #stage {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        #puppet-img {
            max-width: 100%;
            height: auto;
            max-height: 250px;
        }

        /* Area Input Nama */
        #name-input-section input {
            width: 80%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }
        #name-input-section input:focus { border-color: #d81b60; }

        /* Animasi standar gambar */
        .puppet-anim { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Desain Sertifikat Mini di dalam Card */
        #certificate-wrapper {
            width: 100%;
            background-color: #fffaf0;
            border: 8px solid #fce4ec;
            padding: 10px;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .cert-inner {
            border: 2px dashed #d81b60;
            padding: 20px 10px;
            text-align: center;
            position: relative;
        }

        .cert-title { font-size: 20px; font-weight: 600; color: #d81b60; letter-spacing: 2px; text-transform: uppercase; }
        .cert-sub { font-size: 11px; color: #555; margin-bottom: 15px; margin-top: 5px; }
        .cert-name { font-family: 'Great Vibes', cursive; font-size: 42px; color: #d4af37; margin: 5px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .cert-reason { font-size: 12px; margin-top: 15px; line-height: 1.5; }
        .cert-highlight { font-size: 16px; font-weight: 600; color: #d81b60; display: block; margin-top: 5px; }
        
        .cert-footer { display: flex; justify-content: space-between; margin-top: 30px; font-size: 11px; padding: 0 20px; }
        .cert-sign-line { border-top: 1px solid #333; width: 100px; padding-top: 5px; font-weight: 600; }
        .cert-sign-text { height: 25px; line-height: 25px; font-family: 'Great Vibes', cursive; font-size: 22px; color: #d81b60; }
        .cert-date-text { height: 25px; line-height: 25px; font-size: 11px; }
        
        .cert-seal {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 40px; background-color: #d81b60; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; color: white; font-size: 18px;
        }

        /* Animasi meluncur dari atas untuk sertifikat */
        .cert-anim { animation: slideDown 1.5s ease-out forwards; }
        @keyframes slideDown {
            0% { transform: translateY(-80px); opacity: 0;
